# fly.toml — KHAYAL on Fly.io
# https://fly.io/docs/reference/configuration/

app = "khayal"
primary_region = "iad"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines  = "stop"   # spin down when idle — free tier friendly
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"
  cpus   = 1
  cpu_kind = "shared"
